spring:
  datasource:
    url: jdbc:h2:mem:pisitodb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

app:
  storage:
    local-upload-dir: uploads
    public-file-base-path: /api/resources/files
