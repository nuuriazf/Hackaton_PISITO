spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: jdbc:postgresql://localhost:5432/pisito_db
    driver-class-name: org.postgresql.Driver
    username: pisito_user
    password: pisito_password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: never
  h2:
    console:
      enabled: false
      path: /h2-console

server:
  port: 8080
  error:
    include-message: always

ollama:
  base-url: http://localhost:11434
  model: qwen2.5:7b

app:
  jwt:
    # Base64-encoded key. Replace in production with APP_JWT_SECRET.
    secret: ${APP_JWT_SECRET:bXktZGV2LXN1cGVyLXNlY3JldC1rZXktZm9yLWp3dC0zMi1ieXRlcy1taW4=}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}
