spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: jdbc:postgresql://localhost:5432/pisito_db
    driver-class-name: org.postgresql.Driver
    username: pisito_user
    password: pisito_password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: never
  h2:
    console:
      enabled: false
      path: /h2-console

server:
  port: 8080
  error:
    include-message: always

ollama:
  base-url: http://localhost:11434
  model: llama3.1:8b

spotify:
  api-base-url: https://api.spotify.com/v1
  auth-base-url: https://accounts.spotify.com
  client-id: ${SPOTIFY_CLIENT_ID:23f5df62147c459b9c6a47a9c6a33d6f}
  client-secret: ${SPOTIFY_CLIENT_SECRET:e316d0caf66b4f1daee11da8654f3e3e}
app:
  upload:
    dir: uploads
  jwt:
    # Base64-encoded key. Replace in production with APP_JWT_SECRET.
    secret: ${APP_JWT_SECRET:bXktZGV2LXN1cGVyLXNlY3JldC1rZXktZm9yLWp3dC0zMi1ieXRlcy1taW4=}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}
