spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/pisito_db
    username: pisito_user
    password: pisito_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080
app:
  upload:
    dir: uploads